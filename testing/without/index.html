<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Pinball</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div>
        <h1 class="title">Prompt Pinball</h1>
        <p class="subtitle">
          Keep the ball alive, rack up prompts. A / ← left flipper · D / →
          right flipper
        </p>
        <div class="stage">
          <canvas id="board" width="440" height="680"></canvas>
          <div class="overlay" id="overlay">
            <h2>Game Over</h2>
            <p class="final">Final score: <span id="final-score">0</span></p>
            <p>Press Restart or hit <kbd>Space</kbd></p>
            <button class="btn" id="overlay-restart">Restart</button>
          </div>
        </div>
      </div>

      <aside class="sidebar">
        <div class="card">
          <div class="label">Score</div>
          <div class="score-value" id="score">0</div>
        </div>

        <div class="card">
          <div class="label">Lives</div>
          <div class="lives" id="lives"></div>
        </div>

        <div class="card log-card">
          <div class="label">Event log</div>
          <ul class="log" id="log">
            <li class="empty">Hit a bumper to start logging…</li>
          </ul>
        </div>

        <button class="btn" id="restart">Restart game</button>

        <div class="controls">
          <div><kbd>A</kbd> / <kbd>←</kbd> &nbsp;left flipper</div>
          <div><kbd>D</kbd> / <kbd>→</kbd> &nbsp;right flipper</div>
          <div><kbd>Space</kbd> &nbsp;restart after game over</div>
        </div>
      </aside>
    </div>

    <script src="physics.js"></script>
    <script src="game.js"></script>
  </body>
</html>
